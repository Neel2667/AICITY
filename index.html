<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICITY Live — 24/7 Living City</title>
  <meta name="description" content="A persistent miniature city built for a 24/7 YouTube live stream.">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app"></div>

  <!-- Night vignette overlay -->
  <div class="night-vignette" id="nightVignette"></div>

  <!-- Audio mute toggle -->
  <button class="audio-btn" id="audioBtn" title="Toggle city sounds">🔇 Sounds Off</button>

  <script type="module" src="/src/main.ts"></script>
  <script type="module">
    // Audio button wires to ambientAudio after module loads
    import('/src/main.ts').catch(() => {});
    const btn = document.getElementById('audioBtn');
    let muted = true;
    btn?.addEventListener('click', () => {
      muted = !muted;
      btn.textContent = muted ? '🔇 Sounds Off' : '🔊 Sounds On';
      // ambientAudio singleton is accessible via window after main.ts loads
      const audio = window.__aicityAudio;
      if (audio) {
        if (!muted && !audio.isStarted()) audio.start();
        // Note: AmbientAudio master gain controls volume
      }
    });
  </script>
</body>
</html>
